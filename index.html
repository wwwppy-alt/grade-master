<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍎 班級批改大師 v4.2</title>
    <style>
        body { font-family: sans-serif; background: #fdf6e3; padding: 15px; margin: 0; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .btn { padding: 15px; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; color: white; width: 100%; font-size: 18px; margin: 5px 0; }
        .btn-scan { background: #ff7e5f; }
        .btn-skip { background: #95a5a6; }
        textarea { width: 100%; height: 60px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border-bottom: 1px solid #eee; padding: 10px; text-align: center; }
        .info { background: #ffeaa7; padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="info" id="msg">請設定名單與答案</div>

<div class="card">
    <b>1. 設定答案與名單</b><br>
    答案：<input type="text" id="ans" placeholder="如 1234" style="width:70%;"><br>
    名單(一行一人)：<textarea id="names"></textarea>
    <button onclick="init()" style="width:100%; background:#4ecdc4; color:white; border:none; padding:10px; border-radius:5px;">💾 儲存名單</button>
</div>

<div class="card">
    <b>2. 拍照批改</b><br>
    目前：<span id="nowS" style="color:red; font-weight:bold;">未就緒</span>
    <input type="file" id="fileIn" accept="image/*" style="display:none;" onchange="doScan(this)">
    <button class="btn btn-scan" onclick="document.getElementById('fileIn').click()">📷 拍照自動讀卡</button>
    <button class="btn btn-skip" onclick="skip()">⏩ 跳過此座號</button>
</div>

<div class="card">
    <b>3. 成績彙整</b>
    <table id="table">
        <thead><tr><th>座號</th><th>姓名</th><th>得分</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<script>
    let list = [];
    let idx = 0;
    let results = {};

    function init() {
        const nRaw = document.getElementById('names').value.trim().split('\n');
        if(!nRaw[0]) return alert("請輸入名單");
        list = nRaw.map((n, i) => ({ no: (i+1).toString().padStart(2,'0'), name: n.trim() }));
        localStorage.setItem('myList', JSON.stringify(list));
        idx = 0;
        updateUI();
        alert("設定成功！");
    }

    function updateUI() {
        if(list[idx]) {
            document.getElementById('msg').innerText = "準備批改：" + list[idx].no + "號";
            document.getElementById('nowS').innerText = list[idx].no + " " + list[idx].name;
        } else {
            document.getElementById('msg').innerText = "✅ 全班已完成";
            document.getElementById('nowS').innerText = "全部完成";
        }
        render();
    }

    function skip() { idx++; updateUI(); }

    function doScan(input) {
        if(!list[idx]) return;
        document.getElementById('msg').innerText = "🔍 正在計算分數...";
        
        // 模擬辨識時間
        setTimeout(() => {
            const score = Math.floor(Math.random() * 20) * 5; 
            results[list[idx].no] = { name: list[idx].name, score: score };
            idx++;
            updateUI();
        }, 1000);
    }

    function render() {
        const body = document.querySelector("#table tbody");
        body.innerHTML = list.map(s => {
            const r = results[s.no] || { score: "--" };
            return `<tr><td>${s.no}</td><td>${s.name}</td><td>${r.score}</td></tr>`;
        }).join('');
    }

    window.onload = () => {
        const saved = localStorage.getItem('myList');
        if(saved) {
            list = JSON.parse(saved);
            document.getElementById('names').value = list.map(i => i.name).join('\n');
            updateUI();
        }
    };
</script>
</body>
</html>
