<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍎 智慧讀卡大師 v2.0 - 5年O班專屬</title>
    <script async src="https://docs.opencv.org/4.5.2/opencv.js" onload="onOpenCvReady();"></script>
    <style>
        :root { --primary: #ff7e5f; --bg: #fdf6e3; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        .container { max-width: 600px; margin: auto; }
        .card { background: #fff; padding: 20px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* 彈出確認視窗 */
        #confirmModal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; 
        }
        .modal-content { background: white; padding: 20px; border-radius: 15px; text-align: center; max-width: 90%; }
        .crop-img { border: 2px solid var(--primary); margin: 10px 0; max-width: 100%; }
        
        .btn { padding: 12px 25px; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; width: 100%; margin: 5px 0; }
        .btn-run { background: linear-gradient(to right, #ff7e5f, #feb47b); }
        .btn-confirm { background: #4ecdc4; }
        
        #loading { display:none; color: var(--primary); font-weight: bold; text-align: center; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color: var(--primary);">🍎 智慧讀卡大師 v2.0</h1>
    <p id="cvStatus">⏳ 正在載入影像引擎...</p>

    <div class="card">
        <h2>1. 設定正確答案與名單</h2>
        <textarea id="ansPaster" placeholder="貼上答案串 (如: 1234...)" style="width:100%; height:60px;"></textarea>
        <textarea id="studentInput" placeholder="座號,姓名" style="width:100%; height:60px; margin-top:10px;"></textarea>
    </div>

    <div class="card">
        <h2>2. 拍照批改</h2>
        <input type="file" id="fileInput" accept="image/*" style="display:none;">
        <button class="btn btn-run" onclick="document.getElementById('fileInput').click()">📷 拍攝學生答案卡</button>
        <div id="loading">🔍 正在定位座標並分析中...</div>
    </div>

    <div id="resCard" class="card" style="display:none;">
        <h3>批改結果</h3>
        <div id="resList"></div>
    </div>
</div>

<div id="confirmModal">
    <div class="modal-content">
        <h3 id="modalTitle">辨識不確定，請老師確認</h3>
        <p>這題學生畫的是？</p>
        <canvas id="cropCanvas" class="crop-img"></canvas>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn btn-confirm" onclick="manualPick(1)">①</button>
            <button class="btn btn-confirm" onclick="manualPick(2)">②</button>
            <button class="btn btn-confirm" onclick="manualPick(3)">③</button>
            <button class="btn btn-confirm" onclick="manualPick(4)">④</button>
        </div>
        <button class="btn" style="background:#999;" onclick="manualPick(0)">跳過/沒寫</button>
    </div>
</div>

<script>
    let cvReady = false;
    function onOpenCvReady() {
        cvReady = true;
        document.getElementById('cvStatus').innerText = "✅ 影像引擎已就緒";
    }

    const fileInput = document.getElementById('fileInput');
    fileInput.addEventListener('change', (e) => {
        if(!cvReady) return alert("引擎尚未就緒");
        processImage(e.target.files[0]);
    });

    async function processImage(file) {
        document.getElementById('loading').style.display = 'block';
        const img = await createImageBitmap(file);
        
        // --- 核心邏輯：影像辨識 ---
        // 1. 抓取四個角落黑點進行透視變換 (Warp Perspective)
        // 2. 依據照片比例計算 100 題座標
        // 3. 偵測每一題的黑度
        
        // 模擬：發現第 5 題辨識不清晰
        setTimeout(() => {
            showModal(5); 
        }, 1500);
    }

    function showModal(qNum) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('confirmModal').style.display = 'flex';
        document.getElementById('modalTitle').innerText = `第 ${qNum} 題辨識不確定`;
        // 這裡會顯示該題目的局部特寫
    }

    function manualPick(val) {
        document.getElementById('confirmModal').style.display = 'none';
        alert(`已紀錄答案為：${val}`);
        // 繼續處理後續題目與計分
    }
</script>
</body>
</html>
