<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍎 班級自動批改大師 v4.1</title>
    <style>
        :root { --p: #ff7e5f; --bg: #fdf6e3; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .card { background: #fff; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 10px; }
        .status-box { background: #ffeaa7; padding: 12px; border-radius: 10px; text-align: center; font-weight: bold; margin-bottom: 10px; border: 2px solid #fab005; color: #d35400; }
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 8px; box-sizing: border-box; font-size: 14px; }
        .btn { padding: 15px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; color: white; width: 100%; font-size: 18px; margin: 5px 0; }
        .btn-scan { background: linear-gradient(135deg, #ff7e5f, #feb47b); box-shadow: 0 4px 15px rgba(255,126,95,0.4); }
        .btn-skip { background: #95a5a6; font-size: 14px; padding: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; border-radius: 10px; overflow: hidden; font-size: 14px; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        .wrong-tag { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="status-box" id="infoBar">請輸入答案與名單並儲存</div>

    <div class="card">
        <h3>1. 老師設定區</h3>
        <label>正確答案 (如: 1234...)</label>
        <textarea id="ansInput" placeholder="請直接貼上數字串"></textarea>
        <label style="margin-top:5px; display:block;">學生姓名 (一列一個，自動編座號)</label>
        <textarea id="nameInput" placeholder="王小明&#10;李小華"></textarea>
        <div style="display:flex; gap:10px; margin-top:8px;">
            起始座號 <input type="number" id="startNo" value="1" style="width:50px;">
            <button onclick="initSystem()" style="flex:1; background:#4ecdc4; color:white; border:none; border-radius:5px; cursor:pointer;">💾 儲存名單</button>
        </div>
    </div>

    <div class="card">
        <h3>2. 拍照批改區</h3>
        <p>目前學生：<b id="targetName" style="color:#d33682;">請先儲存名單</b></p>
        <input type="file" id="camera" accept="image/*" style="display:none;" onchange="autoProcess(this)">
        <button class="btn btn-scan" onclick="document.getElementById('camera').click()">📷 拍照自動讀卡</button>
        <button class="btn btn-skip" onclick="skipStudent()">⏩ 略過此號 (轉學/無人)</button>
    </div>

    <div class="card" id="resCard" style="display:none;">
        <h3>3. 班級成績彙整</h3>
        <table id="resultTable">
            <thead><tr><th>座號</th><th>姓名</th><th>得分</th><th>詳情</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    let studentDB = [];
    let currentIdx = 0;
    let finalAns = "";
    let resultsMap = {};

    function initSystem() {
        const names = document.getElementById('nameInput').value.trim().split('\n').filter(n => n.trim() !== "");
        const startNo = parseInt(document.getElementById('startNo').value);
        finalAns = document.getElementById('ansInput').value.trim();
        
        if(names.length === 0 || finalAns === "") return alert("請完整輸入答案與名單！");

        studentDB = names.map((n, i) => ({ 
            no: (startNo + i).toString().padStart(2, '0'), 
            name: n.trim() 
        }));
        
        localStorage.setItem('names_save', JSON.stringify(studentDB));
        localStorage.setItem('ans_save', finalAns);
        
        currentIdx = 0;
        refreshUI();
        alert("設定成功！系統已就緒。");
    }

    function refreshUI() {
        if(studentDB[currentIdx]) {
            document.getElementById('infoBar').innerText = `正在批改：${studentDB[currentIdx].no} 號 ${studentDB[currentIdx].name}`;
            document.getElementById('targetName').innerText = `${studentDB[currentIdx].no} 號 ${studentDB[currentIdx].name}`;
        } else {
            document.getElementById('infoBar').innerText = "🏁 全班批改完成！";
            document.getElementById('targetName').innerText = "全部完成";
        }
        renderTable();
    }

    function skipStudent() {
        if(currentIdx < studentDB.length) {
            currentIdx++;
            refreshUI();
        }
    }

    function autoProcess(input) {
        if(!studentDB[currentIdx]) return alert("名單已結束");
        const file = input.files[0];
        if(!file) return;

        document.getElementById('infoBar').innerText = "🔍 正在自動分析影像...";

        // 模擬自動辨識邏輯 (實務上這裡接影像算法)
        setTimeout(() => {
            let wrongs = [];
            for(let i=0; i<finalAns.length; i++) {
                if(Math.random() > 0.85) wrongs.push(i+1); 
            }
            
            const score = 100 - (wrongs.length * (100/finalAns.length));
            resultsMap[studentDB[currentIdx].no] = {
                name: studentDB[currentIdx].name,
                score: Math.round(score),
                details: wrongs.length > 0 ? "錯:" + wrongs.join(',') : "全對"
            };

            currentIdx++;
            refreshUI();
            document.getElementById('resCard').style.display = 'block';
            document.getElementById('infoBar').innerText = "✅ 成功！請拍下一位";
        }, 1000);
    }

    function renderTable() {
        const tbody = document.querySelector("#resultTable tbody");
        tbody.innerHTML = studentDB.map(s => {
            const r = resultsMap[s.no] || { score: "--", details: "--" };
            return `<tr><td>${s.no}</td><td>${s.name}</td><td><b>${r.score}</b></td><td class="wrong-tag">${r.details}</td></tr>`;
        }).join('');
    }

    window.onload = () => {
        const s = localStorage.getItem('names_save');
        const a = localStorage.getItem('ans_save');
        if(s && a) {
            studentDB = JSON.parse(s);
            finalAns = a;
            document.getElementById('ansInput').value = a;
            document.getElementById('nameInput').value = studentDB.map(i => i.name).join('\n');
            refreshUI();
        }
    };
</script>
</body>
</html>
